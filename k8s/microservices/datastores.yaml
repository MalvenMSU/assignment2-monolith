apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-postgres
  namespace: ecommerce-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-postgres
  template:
    metadata:
      labels:
        app: customer-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: customerdb
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: CUSTOMER_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: CUSTOMER_DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: customer-postgres
  namespace: ecommerce-microservices
spec:
  selector:
    app: customer-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
